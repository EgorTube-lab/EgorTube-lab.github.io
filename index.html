<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление</title>
    <!-- перенаправление короче даадададададдадда -->
    <meta http-equiv="refresh" content="3; url=https://egortube.netlify.app/">
</head>
<body>

    <script>

        }, 3000);
    </script>
